<!DOCTYPE html>
<html data-bs-theme="auto">
<head>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jedison@latest/dist/umd/jedison.umd.js"></script>
</head>
<body>
<div class="container">
    <div class="mt-5" id="jedison-container"></div>
</div>

<script>
  const jedison = new Jedison.Create({
    container: document.querySelector('#jedison-container'),
    theme: new Jedison.ThemeBootstrap5(),
    iconLib: 'bootstrap-icons',
    schema: {
      "type": "object",
      "title": "Would you recommend us?",
      "x-format": "radios-inline",
      "x-enumTitles": [
        "Definitely",
        "Probably",
        "Not sure",
        "No"
      ],
      "enum": [
        { "nps": "promoter", "score": 3 },
        { "nps": "likely", "score": 2 },
        { "nps": "passive", "score": 1 },
        { "nps": "detractor", "score": 0 }
      ]
    }
  })
</script>
</body>
</html>
